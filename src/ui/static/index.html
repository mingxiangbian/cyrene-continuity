<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cyrene Memory Console</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app" class="app-shell" data-app>
      <aside class="sidebar" aria-label="Memory navigation">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">C</div>
          <div>
            <p class="eyebrow">Cyrene</p>
            <h1>Cyrene Memory Console</h1>
          </div>
        </div>
        <nav class="nav-list" data-nav aria-label="Memory sections"></nav>
      </aside>
      <main class="main-shell">
        <header class="topbar" data-topbar></header>
        <section class="content-grid" aria-label="Memory workspace">
          <div class="workspace" data-workspace></div>
          <aside class="detail-rail" data-detail-rail aria-label="Memory detail"></aside>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
